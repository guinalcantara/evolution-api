services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_official
    restart: unless-stopped
    env_file:
      - ./env_n8n.env
    depends_on:
      n8n-postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - chatwoot-net

  n8n-postgres:
    image: postgres:15
    container_name: n8n_postgres
    restart: unless-stopped
    env_file:
      - ./env_n8n.env
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - chatwoot-net

volumes:
  n8n_data:
  n8n_postgres_data:

networks:
  chatwoot-net:
    external: true
    name: chatwoot-net
