services:
  chatwoot-init:
    image: chatwoot/chatwoot:v4.14.1-ce
    entrypoint: ["/app/docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]
    env_file:
      - ./env_chatwoot.env
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
    networks:
      - chatwoot-net

  chatwoot:
    image: chatwoot/chatwoot:v4.14.1-ce
    container_name: chatwoot_official
    restart: unless-stopped
    entrypoint: ["/app/docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "rails", "server", "-p", "3000", "-b", "0.0.0.0"]
    env_file:
      - ./env_chatwoot.env
    volumes:
      - chatwoot_storage_data:/app/storage
    ports:
      - "3002:3000"
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
      chatwoot-init:
        condition: service_completed_successfully
    networks:
      - chatwoot-net

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.14.1-ce
    container_name: chatwoot_sidekiq
    restart: unless-stopped
    entrypoint: ["/app/docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    env_file:
      - ./env_chatwoot.env
    volumes:
      - chatwoot_storage_data:/app/storage
    depends_on:
      chatwoot-postgres:
        condition: service_healthy
      chatwoot-redis:
        condition: service_healthy
      chatwoot-init:
        condition: service_completed_successfully
    networks:
      - chatwoot-net

  chatwoot-postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatwoot_production
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: chatwoot
    volumes:
      - chatwoot_postgres_data:/var/lib/postgresql/data
    networks:
      - chatwoot-net
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatwoot -d chatwoot_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  chatwoot-redis:
    image: redis:7-alpine
    container_name: chatwoot_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot_redis_data:/data
    networks:
      - chatwoot-net
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: chatwoot_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - chatwoot-net

volumes:
  chatwoot_postgres_data:
  chatwoot_redis_data:
  chatwoot_storage_data:

networks:
  chatwoot-net:
    external: true
    name: chatwoot-net
